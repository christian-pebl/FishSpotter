name: Playwright

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-db: ${{ steps.g.outputs.has-db }}
    steps:
      - id: g
        env:
          DB_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: |
          if [ -n "$DB_URL" ]; then
            echo "has-db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-db=false" >> "$GITHUB_OUTPUT"
            echo "::notice::POSTGRES_PRISMA_URL not configured — skipping Playwright e2e."
          fi

  e2e:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx prisma generate
      - run: npm run test:e2e
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-not-real' }}
          NEXTAUTH_URL: http://localhost:3000
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: snippets
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
