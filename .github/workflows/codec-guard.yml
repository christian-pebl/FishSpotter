name: Codec guard

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"

jobs:
  # Q3B-T1: skip the job when POSTGRES_PRISMA_URL is missing OR malformed.
  # Previously the secret being set but not a valid postgres URL would crash
  # the Prisma client init and fail the run, spamming failure emails on
  # every push. With this gate, an invalid secret just skips cleanly.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-db: ${{ steps.g.outputs.has-db }}
    steps:
      - id: g
        env:
          DB_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: |
          if [ -n "$DB_URL" ] && echo "$DB_URL" | grep -qE '^postgres(ql)?://'; then
            echo "has-db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-db=false" >> "$GITHUB_OUTPUT"
            echo "::notice::POSTGRES_PRISMA_URL missing or not a postgres URL; skipping Codec guard."
          fi

  ffprobe:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install ffmpeg (provides ffprobe)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npx prisma generate
      - name: Probe every Snippet.videoUrl
        run: npx tsx scripts/check-codecs.ts
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
