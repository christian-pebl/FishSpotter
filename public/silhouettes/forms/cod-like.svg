<svg width="100%" height="100%" aria-hidden="true" fill="currentColor" viewBox="0 0 64 44" xmlns="http://www.w3.org/2000/svg">
  <!-- Gadoid (cod/pollack/bib) gestalt. Faces left: blunt rounded forehead, body
       tapering to a slim caudal peduncle. The signature is drawn straight into
       the body CONTOUR — three separate dorsal humps along the back and two anal
       humps below the rear — with deep dips between them, so they read as
       distinct fins at icon size instead of the previous merged ridge. -->
  <path d="M7 22
           C8 18 9 16 12 16
           C14.5 11.5 15.5 7.5 18 7.5
           C20.5 7.5 21 13 22 14
           C24 11 26 5 29 5
           C32 5 33 13 35 14
           C37.5 9.5 38.5 8 41 8
           C45 8.5 49 15 52 18
           C53.5 18.8 54.5 19.4 55 20
           C55.5 21 55.5 23 55 24
           C54.5 24.6 53.5 25.2 52 26
           C49 27.5 46 32 44 33
           C42 33 40.5 27.8 39 27
           C37 27.5 35 33 33 33
           C31 33 29.5 27.8 28 27
           C22 27.5 16 28 12 28
           C9 28 8 24 7 22 Z"/>
  <!-- Shallow-forked (emarginate) caudal on the slim peduncle -->
  <path d="M54 20
           C58 16.5 61 15.5 63 15
           C61.5 18 61 20 61 22
           C61 24 61.5 26 63 29
           C61 28.5 58 27.5 54 24
           C54.5 22.7 54.5 21.3 54 20 Z"/>
  <!-- Pectoral fin, low behind the head -->
  <path d="M15.5 26
           C12.5 30 14 34 18 34.5
           C18.5 31 18 28 16.5 26.3 Z"/>
  <!-- Chin barbel — the gadoid tell; small, may soften at the smallest sizes -->
  <path d="M8 26.5
           C7 29.5 7.6 31.5 9.2 32
           C9.6 29.6 9.2 27.6 8.8 26.6 Z"/>
</svg>
